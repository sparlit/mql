name: Ultimate Auto-Merge

on:
  push:
    branches-ignore:
      - main

jobs:
  auto-merge-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so git can merge properly

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python Smoke Test
        run: |
          python Python/stress_test.py

      - name: Direct Git Merge to Main
        run: |
          # Configure virtual bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force checkout main and merge the triggering feature branch
          git checkout main
          git merge origin/${{ github.ref_name }} --no-edit
          
          # Push the final combined code back to GitHub
          git push origin main
