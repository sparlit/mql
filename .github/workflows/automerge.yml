name: Ultimate Auto-Merge

on:
  push:
    branches-ignore:
      - main

jobs:
  auto-merge-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
      uses: actions/checkout@v4

      - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

      - name: Install Trading Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn requests pyjwt passlib[bcrypt] python-multipart jinja2 pandas numpy xgboost faiss-cpu transformers torch optimum[onnxruntime] scikit-learn lxml

      - name: Create Dummy Vault for CI
        run: |
          mkdir -p src
          echo '{"MASTER_KEY": "AAT_SECURE_FOSS_KEY_256_BIT_STRIP", "ADMIN_USERNAME": "admin", "ADMIN_PASSWORD": "password123", "JWT_SECRET": "sovereign_secret_key_v5"}' > src/vault.json

      - name: Run Python Smoke Test
        run: |
          # Ensure essential directories exist
          mkdir -p db logs models data

          # Start V5 engine
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/core/main.py > engine.log 2>&1 &

          # Wait for engine to start or timeout (NLP models can take 2-3 mins)
          echo "Waiting for Brain to start..."
          for i in {1..60}; do
            if grep -q "Brain listening" engine.log; then
              echo "Brain is ready!"
              break
            fi
            echo "Still waiting... ($((i*5))s)"
            sleep 5
          done

          # Verify health
          curl -v http://127.0.0.1:8000/health || (cat engine.log && false)

          kill $(pgrep -f "src/core/main.py") || true
          cat engine.log

      - name: Force Admin Merge via PR Bypass
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_PAT }}
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          # Ensure we are on the correct branch and it is up to date
          PR_URL=$(gh pr create --base main --head ${{ github.ref_name }} --title "Auto-Sync: ${{ github.ref_name }}" --body "Automated background sync." || gh pr view --json url --jq .url)

          # Attempt to merge. If there are conflicts, the previous steps ensure we tried our best.
          gh pr merge "$PR_URL" --merge --admin
