name: Ultimate Auto-Merge

on:
  push:
    branches-ignore:
      - main

jobs:
  auto-merge-engine:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Trading Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance scipy statsmodels scikit-learn

      - name: Run Python Smoke Test
        run: |
          python Python/stress_test.py

      - name: Force Admin Merge via PR Bypass
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create --base main --head ${{ github.ref_name }} --title "Auto-Sync: ${{ github.ref_name }}" --body "Automated background sync." || gh pr view --json url --jq .url)
          gh pr merge "$PR_URL" --merge --admin --disable-auto
